<div class="user-profile-popover-wrapper" ref="popoverRef">
  <slot name="trigger" :showPopover="showPopover" :hidePopover="hidePopover"></slot>
  
  <transition name="popover-fade">
    <div v-show="isVisible" class="user-profile-popover" @mouseenter="keepVisible" @mouseleave="hidePopover">
      <div class="popover-header">
        <div class="popover-avatar">
          <img v-if="userAvatar" :src="userAvatar" alt="用户头像" />
          <span v-else>{{ username.charAt(0).toUpperCase() }}</span>
        </div>
        <div class="popover-info">
          <div class="popover-username">{{ username }}</div>
          <div class="popover-role">普通用户</div>
        </div>
      </div>
      <div class="popover-divider"></div>
      <div class="popover-actions">
        <button class="popover-btn settings-btn" @click="goToSettings">
          <span class="btn-icon">⚙️</span>
          <span class="btn-text">设置</span>
        </button>
      </div>
    </div>
  </transition>
</div>
